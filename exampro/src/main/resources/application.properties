spring.application.name=exampro

# ========== DATABASE ==========
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/secure_exam_pro}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========== JPA ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========== JWT ==========
jwt.secret=${JWT_SECRET:exampro-secret-key-change-this-in-production}
jwt.expiration=86400000

# ========== SERVER ==========
server.port=${SERVER_PORT:8080}

# ========== LOGGING ==========
logging.level.com.secureai.exampro=INFO